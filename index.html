<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>QuizLab — Тестирование</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0f1a;
  --bg2:#111827;
  --panel:rgba(17,24,39,0.8);
  --panel2:rgba(22,31,50,0.9);
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.1);
  --accent:#10d9a0;
  --accent2:#0ea47a;
  --accent-glow:rgba(16,217,160,0.18);
  --accent-dim:rgba(16,217,160,0.08);
  --muted:#7b8599;
  --text:#e2e8f0;
  --text2:#c3cdd8;
  --danger:#f87171;
  --danger2:#ef4444;
  --success:#10d9a0;
  --wrong:#f87171;
  --shadow:0 20px 60px rgba(0,0,0,0.5);
  --shadow-sm:0 4px 20px rgba(0,0,0,0.3);
  --r:14px;
  --r-sm:10px;
}
.light{
  --bg:#f0f4f8;
  --bg2:#ffffff;
  --panel:rgba(255,255,255,0.95);
  --panel2:rgba(248,250,252,0.98);
  --border:rgba(0,0,0,0.07);
  --border2:rgba(0,0,0,0.12);
  --accent:#0a9e74;
  --accent2:#078860;
  --accent-glow:rgba(10,158,116,0.12);
  --accent-dim:rgba(10,158,116,0.06);
  --muted:#64748b;
  --text:#0f172a;
  --text2:#334155;
  --danger:#dc2626;
  --danger2:#b91c1c;
  --success:#0a9e74;
  --wrong:#dc2626;
  --shadow:0 20px 60px rgba(0,0,0,0.1);
  --shadow-sm:0 4px 20px rgba(0,0,0,0.07);
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Plus Jakarta Sans',system-ui,sans-serif;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}

/* Background */
body::before{
  content:'';
  position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(16,217,160,0.06) 0%,transparent 60%),
             radial-gradient(ellipse 60% 50% at 80% 80%,rgba(99,102,241,0.05) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}
.light body::before{
  background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(10,158,116,0.05) 0%,transparent 60%);
}

.container{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:20px 16px 40px}

/* Header */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;border-radius:var(--r);
  background:var(--panel);backdrop-filter:blur(16px);
  border:1px solid var(--border);box-shadow:var(--shadow-sm);
  margin-bottom:18px;
}
.header-left{display:flex;align-items:center;gap:12px}
.logo{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;color:#fff;letter-spacing:-0.5px;
  flex-shrink:0;
}
.title{font-weight:800;font-size:18px;line-height:1.2;letter-spacing:-0.3px}
.subtitle{color:var(--muted);font-size:12px;margin-top:2px}

.theme-btn{
  background:transparent;border:1px solid var(--border2);color:var(--muted);
  padding:7px 14px;border-radius:999px;cursor:pointer;
  font-family:inherit;font-size:13px;font-weight:600;
  transition:all .2s;
}
.theme-btn:hover{background:var(--border);color:var(--text)}

/* Card */
.card{
  background:var(--panel);backdrop-filter:blur(16px);
  border:1px solid var(--border);border-radius:var(--r);
  box-shadow:var(--shadow-sm);padding:22px;
}

/* Progress */
.progress-row{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.progress-small{font-size:13px;color:var(--muted);font-weight:500;white-space:nowrap}
.progress-track{flex:1;height:6px;background:var(--border);border-radius:999px;overflow:hidden}
.progress-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s cubic-bezier(.4,0,.2,1);border-radius:999px}
.progress-pct{font-size:12px;color:var(--muted);font-weight:600;min-width:36px;text-align:right}

/* Question */
.question{font-size:18px;font-weight:700;line-height:1.5;margin-bottom:16px;color:var(--text);white-space:pre-line;letter-spacing:-0.2px}
.question img {
  max-width: 100%;
  max-height: 280px;
  height: auto;
  object-fit: contain;
  border-radius: var(--r-sm);
  margin-top: 12px;
  display: block;
  border: 1px solid var(--border);
  background: var(--accent-dim);
  padding: 4px;
}
.opt-text img {
  max-width: 100%;
  max-height: 200px;
  height: auto;
  object-fit: contain;
  border-radius: var(--r-sm);
  display: block;
  margin-top: 8px;
  border: 1px solid var(--border);
  background: var(--bg2);
  padding: 4px;
}

/* Options */
.options{display:flex;flex-direction:column;gap:8px}
.option{
  display:flex;align-items:center;gap:12px;
  padding:13px 16px;border-radius:var(--r-sm);
  background:var(--accent-dim);
  border:1px solid var(--border);
  cursor:pointer;transition:all .18s ease;user-select:none;
}
.option:hover{border-color:rgba(16,217,160,0.25);background:rgba(16,217,160,0.1);transform:translateX(4px)}
.opt-marker{
  width:22px;height:22px;flex-shrink:0;border-radius:50%;
  border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:var(--muted);
  transition:all .18s;
}
.opt-text{flex:1;font-size:15px;font-weight:500;color:var(--text2);line-height:1.4}
.option input{display:none}

.option.selected:not(.correct):not(.incorrect){
  background:rgba(16,217,160,0.12);
  border-color:var(--accent);
}
.option.selected:not(.correct):not(.incorrect) .opt-marker{
  background:var(--accent);border-color:var(--accent);color:#fff;
}
.option.correct{background:rgba(16,217,160,0.15);border-color:var(--accent)}
.option.correct .opt-marker{background:var(--accent);border-color:var(--accent);color:#fff}
.option.correct .opt-text{color:var(--success)}
.option.incorrect{background:rgba(248,113,113,0.12);border-color:var(--wrong)}
.option.incorrect .opt-marker{background:var(--wrong);border-color:var(--wrong);color:#fff}
.option.incorrect .opt-text{color:var(--wrong)}

/* Meta */
.meta{display:flex;align-items:flex-start;gap:12px;margin-top:14px;flex-wrap:wrap}
.feedback{
  display:none;padding:8px 14px;border-radius:var(--r-sm);
  font-weight:700;font-size:13px;
}
.feedback.correct{background:rgba(16,217,160,0.1);color:var(--success);border:1px solid rgba(16,217,160,0.2)}
.feedback.incorrect{background:rgba(248,113,113,0.1);color:var(--wrong);border:1px solid rgba(248,113,113,0.2)}
.explain{font-size:13px;color:var(--muted);display:none;line-height:1.5;flex:1}

/* Nav */
.nav{display:flex;align-items:center;gap:10px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap}
.btn{
  padding:10px 20px;border-radius:var(--r-sm);border:none;
  font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;
  transition:all .18s;letter-spacing:-0.1px;
}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-primary:hover{opacity:0.9;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-ghost{
  background:transparent;border:1px solid var(--border2);color:var(--text2);
}
.btn-ghost:hover{background:var(--border);border-color:var(--border2)}
.btn-ghost:disabled{opacity:.35;cursor:not-allowed}
.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
.btn-danger:hover{opacity:0.9}

.auto-skip-toggle{
  display:flex;align-items:center;gap:7px;
  color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;margin-right:4px;
}
.toggle{
  width:36px;height:20px;border-radius:999px;
  background:var(--border2);position:relative;cursor:pointer;
  transition:background .2s;flex-shrink:0;border:none;
}
.toggle::after{
  content:'';position:absolute;top:3px;left:3px;
  width:14px;height:14px;border-radius:50%;background:#fff;
  transition:transform .2s;
}
.toggle.on{background:var(--accent)}
.toggle.on::after{transform:translateX(16px)}

/* Bottom fill */
.bottom-cell{margin-top:16px;display:none}
.bottom-cell.visible{display:block}
.bottom-cell .track{
  width:100%;height:4px;border-radius:999px;
  background:var(--border);overflow:hidden;
}
.bottom-cell .fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:width .05s linear;border-radius:999px;
}
.bottom-cell .label{margin-top:6px;text-align:right;color:var(--muted);font-size:12px}

/* Results */
.results{
  display:none;margin-top:18px;padding:28px;
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--r);box-shadow:var(--shadow-sm);
  text-align:center;
}
.score-ring{
  width:90px;height:90px;margin:0 auto 16px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  box-shadow:0 0 30px var(--accent-glow);
}
.score-num{font-size:22px;font-weight:800;color:#fff}
.score-label{color:rgba(255,255,255,0.7);font-size:11px;font-weight:600;margin-top:2px}
.result-title{font-size:22px;font-weight:800;margin-bottom:6px;letter-spacing:-0.3px}
.result-msg{color:var(--muted);margin-bottom:20px}
.stats-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  max-width:440px;margin:0 auto 20px;
}
.stat-card{
  background:var(--accent-dim);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:12px 10px;
}
.stat-val{font-size:20px;font-weight:800;color:var(--accent)}
.stat-key{font-size:11px;color:var(--muted);margin-top:3px;font-weight:500}
.result-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* Modal backdrop */
.modal{
  position:fixed;inset:0;
  background:rgba(5,8,15,0.75);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  z-index:2000;padding:16px;
}
.modal-card{
  background:var(--panel2);border:1px solid var(--border2);
  border-radius:16px;box-shadow:var(--shadow);
  width:100%;max-width:500px;padding:26px;
  animation:slideUp .25s cubic-bezier(.4,0,.2,1);
  max-height:90vh;
  overflow-y:auto;
}
.modal-card::-webkit-scrollbar { width: 6px; }
.modal-card::-webkit-scrollbar-track { background: transparent; }
.modal-card::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.modal-logo{
  width:44px;height:44px;border-radius:12px;margin-bottom:16px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;color:#fff;
}
.modal-title{font-size:20px;font-weight:800;letter-spacing:-0.3px;margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:20px}

/* Subject cards */
.subjects-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.subject-card{
  padding:14px;border-radius:var(--r-sm);
  background:var(--accent-dim);border:1px solid var(--border);
  cursor:pointer;transition:all .18s;text-align:left;
  font-family:inherit;
}
.subject-card:hover{border-color:rgba(16,217,160,0.3);background:rgba(16,217,160,0.1)}
.subject-card.selected{border-color:var(--accent);background:rgba(16,217,160,0.15)}
.subj-icon{font-size:22px;margin-bottom:8px;line-height:1}
.subj-name{font-size:14px;font-weight:700;color:var(--text)}
.subj-count{font-size:11px;color:var(--muted);margin-top:3px;font-weight:500}

/* Mode selection */
.mode-sep{
  display:flex;align-items:center;gap:10px;margin:18px 0 14px;
}
.mode-sep::before,.mode-sep::after{content:'';flex:1;height:1px;background:var(--border)}
.mode-sep span{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap}
.mode-btns{display:flex;flex-direction:column;gap:8px}
.mode-btn{
  width:100%;padding:13px 16px;border-radius:var(--r-sm);
  font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;
  text-align:left;transition:all .18s;border:1px solid transparent;
  display:flex;align-items:center;gap:12px;
}
.mode-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none}
.mode-primary:hover{opacity:.9}
.mode-secondary{
  background:var(--accent-dim);border:1px solid var(--border2);color:var(--text);
}
.mode-secondary:hover{border-color:rgba(16,217,160,0.3);background:rgba(16,217,160,0.1)}
.mode-icon{font-size:20px}
.mode-info{flex:1}
.mode-name{font-size:14px;font-weight:700}
.mode-desc{font-size:11px;opacity:.7;margin-top:1px;font-weight:500}

/* Confirm modal */
.confirm-modal{
  position:fixed;inset:0;
  background:rgba(5,8,15,0.75);backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;
  z-index:3000;padding:16px;
}
.confirm-modal.open{display:flex}
.confirm-card{
  background:var(--panel2);border:1px solid var(--border2);
  border-radius:16px;box-shadow:var(--shadow);
  width:100%;max-width:360px;padding:24px;
  text-align:center;animation:slideUp .2s cubic-bezier(.4,0,.2,1);
}
.confirm-icon{font-size:32px;margin-bottom:12px}
.confirm-title{font-size:18px;font-weight:800;margin-bottom:6px}
.confirm-msg{font-size:14px;color:var(--muted);margin-bottom:20px;line-height:1.5}
.confirm-btns{display:flex;gap:10px}
.confirm-btns button{flex:1}

@media(max-width:480px){
  .subjects-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
  .nav{justify-content:space-between}
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <div class="logo">Q</div>
      <div>
        <div class="title" id="testTitle">QuizLab</div>
        <div class="subtitle" id="testSubtitle">Выберите предмет для начала</div>
      </div>
    </div>
    <button class="theme-btn" id="themeBtn">☀ Тема</button>
  </div>

  <div class="card" id="questionCard" style="display:none">
    <div class="progress-row">
      <div class="progress-small" id="psmall">Вопрос 1 из N</div>
      <div class="progress-track"><div id="progressBar" class="progress-bar"></div></div>
      <div class="progress-pct" id="ppct">0%</div>
    </div>

    <div class="question" id="qtext">Загрузка...</div>
    <div class="options" id="options"></div>

    <div class="meta">
      <div id="feedback" class="feedback"></div>
      <div id="explain" class="explain"></div>
    </div>

    <div class="nav">
      <button id="prevBtn" class="btn btn-ghost">← Назад</button>
      <button id="finishBtn" class="btn btn-danger" style="display:none">Завершить</button>
      <label class="auto-skip-toggle" title="Автоматически перейти к следующему вопросу после ответа">
        <input type="checkbox" id="autoSkip" style="display:none"/>
        <div class="toggle" id="toggleUI"></div>
        <span>Автопропуск</span>
      </label>
      <button id="actionBtn" class="btn btn-primary">Следующий</button>
    </div>

    <div class="bottom-cell" id="bottomCell">
      <div class="track"><div class="fill" id="bottomFill"></div></div>
      <div class="label" id="bottomLabel"></div>
    </div>
  </div>

  <div id="results" class="results">
    <div class="score-ring">
      <div>
        <div class="score-num" id="finalScore">0/0</div>
        <div class="score-label">БАЛЛЫ</div>
      </div>
    </div>
    <div class="result-title">Тест завершён!</div>
    <div class="result-msg" id="resultMessage"></div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-val" id="correctAnswers">0</div>
        <div class="stat-key">Правильно</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--wrong)" id="wrongAnswers">0</div>
        <div class="stat-key">Неверно</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="percentage">0%</div>
        <div class="stat-key">Результат</div>
      </div>
    </div>
    <div class="result-btns">
      <button id="restartBtn" class="btn btn-primary">Пройти снова</button>
      <button id="backToSubjectsBtn" class="btn btn-ghost">Другой тест</button>
    </div>
  </div>
</div>

<!-- Confirm modal -->
<div class="confirm-modal" id="confirmModal">
  <div class="confirm-card">
    <div class="confirm-icon">⚠️</div>
    <div class="confirm-title">Завершить тест?</div>
    <div class="confirm-msg">Все ответы будут сохранены и вы увидите результат.</div>
    <div class="confirm-btns">
      <button id="confirmCancelBtn" class="btn btn-ghost">Отмена</button>
      <button id="confirmFinishBtn" class="btn btn-danger">Завершить</button>
    </div>
  </div>
</div>

<!-- Start modal -->
<div class="modal" id="startModal">
  <div class="modal-card">
    <div class="modal-logo">Q</div>
    <div class="modal-title" id="modalTitle">Выберите предмет</div>
    <div class="modal-sub" id="modalSub">Выберите тему для тестирования</div>

    <div id="subjectList">
      <div class="subjects-grid" id="subjectsGrid"></div>
    </div>

    <div id="modeChoice" style="display:none">
      <div class="mode-sep"><span>Режим прохождения</span></div>
      <div class="mode-btns">
        <button id="singleBtn" class="mode-btn mode-primary">
          <span class="mode-icon">▶</span>
          <div class="mode-info">
            <div class="mode-name">Один раз</div>
            <div class="mode-desc">Пройти все вопросы по порядку</div>
          </div>
        </button>
        <button id="masteryBtn" class="mode-btn mode-secondary">
          <span class="mode-icon">🔁</span>
          <div class="mode-info">
            <div class="mode-name">Mastery</div>
            <div class="mode-desc">Повторять неверные до полного усвоения</div>
          </div>
        </button>
      </div>
      <button id="backToSubjectsBtn2" class="btn btn-ghost" style="width:100%;margin-top:12px">← Назад к выбору</button>
    </div>
  </div>
</div>

<script>
// ====== CONFIG ======
const SUBJECTS = [
  { name: 'Управление БД',    file: 'База по управлению .docx',      icon: '🗄️',  desc: 'SQL, нормализация, реляционная алгебра' },
  { name: 'Сети CISCO',       file: 'CISCO Coursera Quiz.docx',      icon: '🌐',  desc: 'CCNA, маршрутизация, OSI, Packet Tracer' },
  { name: 'Машинное обучение',file: 'ml_questions.txt',              icon: '🤖',  desc: 'K-NN, регрессия, нейросети, классификация' },
  { name: 'Кибербезопасность',file: 'cybersecurity_questions.txt',   icon: '🔐',  desc: 'SIEM, угрозы, OSINT, защита данных' },
  { name: 'Инновации ИС',     file: 'Инно ИС для подготовки.docx',  icon: '💡',  desc: 'Инновационные информационные системы, подготовка', parser: 'gift' },
  { name: 'Java EE (SFT6312)',file: 'java_ee_questions.txt',         icon: '☕',  desc: 'JPA, Spring Boot, JAX-WS, JAX-RS, Security' },
  { name: 'Мультимедиа',      file: 'мультимедия.docx',              icon: '🎬',  desc: 'Коммуникация, модели, сигналы' },
  { name: 'ОЗ',               file: 'пустой доком111.docx',          icon: '📄',  desc: 'Тест по Общественному здоровью', parser: 'docx_first_correct' },
];

// ====== STATE ======
let mode = 'single', selectedSubject = '', currentQuestions = [];
let order = [], currentIndex = 0, score = 0, answered = false;
let userSelections = {}, totalQuestionsInTest = 0, questionsAnswered = 0;
let bottomAnim = null, bottomStart = null, bottomDuration = 0, bottomActive = false;
let autoSkipOn = false;

// ====== SAVE / LOAD ======
function saveState(){
  localStorage.setItem('testState', JSON.stringify({ mode, selectedSubject, order, currentIndex, score, answered, userSelections, totalQuestionsInTest, questionsAnswered }));
}
function loadState(){
  try{ const s = localStorage.getItem('testState'); return s ? JSON.parse(s) : null; } catch(e){ return null; }
}
function clearState(){ localStorage.removeItem('testState'); }

// ====== UTILS ======
function shuffleInPlace(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; } return a; }
function shuffled(a){ return shuffleInPlace(a.slice()); }
function isMulti(q){ return Array.isArray(q.correctAnswers) && q.correctAnswers.length > 1; }

// ====== BOTTOM BAR ======
function startBottomFill(ms){
  if(!autoSkipOn) return;
  if(bottomActive) return;
  bottomActive=true; bottomDuration=ms; bottomStart=null;
  bottomFill.style.width='0%'; bottomLabel.textContent='';
  bottomCell.style.display='block'; bottomCell.classList.add('visible');
  function step(ts){
    if(!bottomStart) bottomStart=ts;
    const pct=Math.min(1,(ts-bottomStart)/bottomDuration);
    bottomFill.style.width=Math.round(pct*100)+'%';
    if(pct<1){ bottomAnim=requestAnimationFrame(step); }
    else { bottomAnim=null; bottomActive=false; if(autoSkipOn) proceedToNext(true); }
  }
  bottomAnim=requestAnimationFrame(step);
}
function stopBottomFill(){
  if(bottomAnim){ cancelAnimationFrame(bottomAnim); bottomAnim=null; }
  bottomStart=null; bottomDuration=0; bottomActive=false;
  bottomCell.classList.remove('visible');
  clearTimeout(bottomCell._hide);
  bottomCell._hide=setTimeout(()=>{ bottomCell.style.display='none'; bottomFill.style.width='0%'; },160);
}
function cancelBottomIfRunning(){ stopBottomFill(); }

// ====== QUESTION PARSING ======
async function loadQuestionsFromFile(subject){
  const s = SUBJECTS.find(s => s.name === subject);
  if(!s) return [];
  try{
    const resp = await fetch(s.file);
    if(!resp.ok) throw new Error('HTTP '+resp.status);

    if (s.parser === 'gift') {
      // Moodle GIFT format — extract paragraphs via mammoth
      const arrayBuffer = await resp.arrayBuffer();
      const result = await mammoth.convertToHtml({arrayBuffer: arrayBuffer});
      const tmp = document.createElement('div');
      tmp.innerHTML = result.value;
      const lines = Array.from(tmp.querySelectorAll('p')).map(p => p.textContent);
      console.log('[GIFT] total paragraphs:', lines.length);
      return parseGiftLines(lines);
    } else if (s.file.endsWith('.docx')) {
      const arrayBuffer = await resp.arrayBuffer();
      const result = await mammoth.convertToHtml({arrayBuffer: arrayBuffer});
      return parseDocxHtml(result.value, subject);
    } else {
      return parseQuestions(await resp.text(), subject);
    }
  } catch(e){
    console.error('Ошибка загрузки:', e);
    return [];
  }
}

// ====== GIFT FORMAT PARSER (Moodle) ======
// Line-by-line parser for GIFT format:
//   // question: 562001  name: Title        ← comment (skip)
//   ::Title::Question text?{                ← question start
//   \t~Wrong answer                         ← wrong option
//   \t=Correct answer                       ← correct option
//   }                                       ← question end
function parseGiftLines(lines) {
  const questions = [];
  let qNum = 1;
  let cur = null;  // current question being built
  let inBlock = false;  // are we inside { ... } ?

  for (let i = 0; i < lines.length; i++) {
    const raw = lines[i];
    const line = raw.trim();

    // Skip empty lines and comments
    if (!line || line.startsWith('//')) continue;

    // Detect question start: ::Title::Question text{
    if (line.match(/^::.*::/) && line.includes('{')) {
      // Save previous question if any
      if (cur && cur.options.length >= 2 && cur.correctAnswers.length > 0) {
        questions.push(cur);
      }
      // Extract question text: remove ::Title:: prefix and trailing {
      let questionText = line.replace(/^::.*?::/, '').replace(/\{\s*$/, '').trim();
      cur = {
        question: questionText,
        questionNumber: qNum++,
        options: [],
        correctAnswers: [],
        explanation: ''
      };
      inBlock = true;
      continue;
    }

    // Detect closing brace — end of answers block
    if (line === '}') {
      if (cur && cur.options.length >= 2 && cur.correctAnswers.length > 0) {
        questions.push(cur);
      }
      cur = null;
      inBlock = false;
      continue;
    }

    // Inside answer block — parse ~wrong and =correct
    if (inBlock && cur) {
      const stripped = line.replace(/^\t+/, '');  // remove leading tabs
      if (stripped.startsWith('~')) {
        cur.options.push(stripped.substring(1).trim());
      } else if (stripped.startsWith('=')) {
        cur.options.push(stripped.substring(1).trim());
        cur.correctAnswers.push(cur.options.length - 1);
      }
    }
  }

  // Push last question if file doesn't end with }
  if (cur && cur.options.length >= 2 && cur.correctAnswers.length > 0) {
    questions.push(cur);
  }

  console.log('[GIFT] parsed questions:', questions.length);
  return questions;
}

function parseDocxHtml(html, subject) {
  const sConfig = SUBJECTS.find(s => s.name === subject);
  const isFirstCorrect = sConfig && sConfig.parser === 'docx_first_correct';

  // Fix for soft newlines in Word combining tags into a single paragraph
  html = html.replace(/<br\s*\/?>/gi, '</p><p>');

  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const questions = [];
  let currentQuestion = null;
  let qNum = 1;

  for (let node of doc.body.childNodes) {
      let rawText = (node.textContent || '').trim();
      let unescapedRaw = rawText.replace(/&lt;/gi, '<').replace(/&gt;/gi, '>');
      
      let htmlContent = node.innerHTML || '';
      if (node.nodeName === 'IMG') htmlContent = node.outerHTML;
      let unescapedHTML = htmlContent.replace(/&lt;/gi, '<').replace(/&gt;/gi, '>');

      if (unescapedRaw.match(/^<\s*question\s*\d*\s*>/i)) {
          if (currentQuestion && currentQuestion.question) questions.push(currentQuestion);
          currentQuestion = {
              question: unescapedHTML.replace(/<\s*question\s*\d*\s*>/i, '').trim(),
              questionNumber: qNum++,
              options: [],
              correctAnswers: [],
              explanation: ''
          };
      } else if (unescapedRaw.match(/^<\s*variant\s*>/i)) {
          if (currentQuestion) {
              let optText = unescapedHTML.replace(/<\s*variant\s*>/i, '').trim();
              if (isFirstCorrect) {
                  let rawOpt = unescapedRaw.replace(/^<\s*variant\s*>/i, '').trim();
                  if (rawOpt.endsWith('+')) {
                      let lastPlusIndex = optText.lastIndexOf('+');
                      if (lastPlusIndex !== -1) {
                          optText = optText.substring(0, lastPlusIndex) + optText.substring(lastPlusIndex + 1);
                      }
                      optText = optText.trim();
                  }
                  currentQuestion.options.push(optText);
                  if (currentQuestion.options.length === 1) {
                      currentQuestion.correctAnswers.push(0);
                  }
              } else {
                  currentQuestion.options.push(optText);
              }
          }
      } else if (unescapedRaw.match(/^<\s*variantright\s*>/i)) {
          if (currentQuestion) {
              currentQuestion.options.push(unescapedHTML.replace(/<\s*variantright\s*>/i, '').trim());
              currentQuestion.correctAnswers.push(currentQuestion.options.length - 1);
          }
      } else {
          if (currentQuestion && unescapedHTML.trim() !== '') {
              if (isFirstCorrect && unescapedRaw === '+') {
                  // Ignore stray '+' on its own line
              } else {
                  currentQuestion.question += '<br>' + unescapedHTML;
              }
          }
      }
  }
  if (currentQuestion && currentQuestion.question) questions.push(currentQuestion);
  return questions.filter(q => q.options.length >= 2 && q.correctAnswers.length > 0);
}

function parseQuestions(text, subject){
  const questions=[], lines=text.split('\n');
  let cur=null, qNum=1;
  for(let i=0;i<lines.length;i++){
    const line=lines[i].trim();
    if((/^\d+\./.test(line)&&line.includes('?'))||(line.startsWith('**')&&line.includes('**'))){
      if(cur&&cur.question) questions.push(cur);
      let qt=line.startsWith('**') ? line.replace(/\*\*/g,'').trim() : line;
      qt=qt.replace(/^\d+\.\s*/,'');
      cur={question:qt,questionNumber:qNum++,options:[],correctAnswers:[],explanation:''};
      let j=i+1;
      while(j<lines.length&&lines[j].trim()&&!lines[j].trim().startsWith('- ')&&!lines[j].includes('Правильный ответ:')&&!lines[j].includes('Correct answer:')&&!/^\d+\./.test(lines[j].trim())){
        cur.question+='\n'+lines[j].trim(); j++; i++;
      }
    } else if(line.startsWith('- ')&&cur){
      cur.options.push(line.substring(2).trim());
    } else if((line.includes('Правильный ответ:')||line.includes('Correct answer:'))&&cur){
      const ans=line.replace(/Правильный ответ:|Correct answer:/gi,'').trim();
      const nums=(ans.match(/\d+/g)||[]).map(n=>parseInt(n)-1).filter(n=>n>=0&&n<cur.options.length);
      nums.sort((a,b)=>a-b);
      cur.correctAnswers=nums;
    } else if(cur&&line&&!line.startsWith('- ')&&!line.includes('Правильный ответ:')&&!line.includes('Correct answer:')&&!/^\d+\./.test(line)){
      cur.explanation+=(cur.explanation?' ':'')+line;
    }
  }
  if(cur&&cur.question) questions.push(cur);
  return questions.filter(q=>q.options.length>=2&&q.correctAnswers.length>0);
}

// ====== SESSION ======
async function startSession(selectedMode, savedState=null){
  mode=selectedMode;
  startModal.style.display='none';
  qtext.textContent='Загрузка вопросов...';
  optionsEl.innerHTML='';
  actionBtn.disabled=true;
  finishBtn.style.display='inline-block';
  questionCard.style.display='block';
  resultsEl.style.display='none';

  currentQuestions=await loadQuestionsFromFile(selectedSubject);
  if(!currentQuestions||currentQuestions.length===0){
    qtext.textContent='Не удалось загрузить вопросы. Убедитесь, что файлы находятся в той же папке.';
    return;
  }

  testTitle.textContent=selectedSubject;
  testSubtitle.textContent=`Режим: ${mode==='single'?'Один раз':'Mastery'} · ${currentQuestions.length} вопросов`;

  if(savedState){
    order=savedState.order; currentIndex=savedState.currentIndex;
    score=savedState.score; answered=savedState.answered;
    userSelections=savedState.userSelections;
    totalQuestionsInTest=savedState.totalQuestionsInTest;
    questionsAnswered=savedState.questionsAnswered;
  } else {
    order=shuffled(Array.from({length:currentQuestions.length},(_,i)=>i));
    currentIndex=0; score=0; answered=false; userSelections={};
    totalQuestionsInTest=currentQuestions.length; questionsAnswered=0;
  }
  renderCurrent(); saveState();
}

// ====== RENDER ======
function renderCurrent(){
  if(currentIndex>=order.length){ showResults(); return; }
  const qidx=order[currentIndex], q=currentQuestions[qidx];
  answered=false;
  feedbackEl.style.display='none'; explainEl.style.display='none';
  optionsEl.innerHTML=''; actionBtn.disabled=true;

  actionBtn.textContent=(mode==='single'&&currentIndex===order.length-1)?'Завершить тест':'Следующий';

  const qN=q.questionNumber||(currentIndex+1);
  psmall.textContent=`Вопрос ${qN} из ${totalQuestionsInTest}`;
  const pct=Math.round(((currentIndex+1)/order.length)*100);
  progressBar.style.width=pct+'%'; ppct.textContent=pct+'%';
  qtext.innerHTML=q?q.question:'Вопрос не найден';
  if(!q){ prevBtn.disabled=true; actionBtn.disabled=true; return; }

  const multi=isMulti(q);
  const LETTERS=['A','B','C','D','E','F'];
  let pairs=q.options.map((t,i)=>({t,orig:i}));
  shuffleInPlace(pairs);

  pairs.forEach((pair,idx)=>{
    const label=document.createElement('label');
    label.className='option';
    const input=document.createElement('input');
    input.type=multi?'checkbox':'radio';
    input.name='opt'+qidx; input.dataset.orig=String(pair.orig);
    const marker=document.createElement('div');
    marker.className='opt-marker';
    marker.textContent=LETTERS[idx]||String(idx+1);
    const span=document.createElement('span');
    span.className='opt-text'; span.innerHTML=pair.t;
    label.appendChild(input); label.appendChild(marker); label.appendChild(span);
    optionsEl.appendChild(label);

    if(!multi){
      label.addEventListener('click',()=>{
        if(answered) return;
        optionsEl.querySelectorAll('input[type="radio"]').forEach(i=>{i.checked=false;i.parentElement.classList.remove('selected');});
        input.checked=true; label.classList.add('selected');
        userSelections[qidx]=[Number(input.dataset.orig)];
        evaluateSingle(qidx,Number(input.dataset.orig));
      });
    } else {
      label.addEventListener('click',(e)=>{
        if(answered) return;
        input.checked=!input.checked;
        label.classList.toggle('selected',input.checked);
        e.stopPropagation();
        actionBtn.disabled=optionsEl.querySelectorAll('input:checked').length===0;
      });
    }
  });

  if(multi){ actionBtn.textContent='Проверить'; actionBtn.disabled=true; }
  prevBtn.disabled=currentIndex===0;
  if(!(autoSkipOn)&&!bottomActive){ bottomCell.style.display='none'; bottomFill.style.width='0%'; }
  saveState();
}

// ====== EVALUATE ======
function evaluateSingle(qidx,chosenOrig){
  const q=currentQuestions[qidx], correct=q.correctAnswers.includes(chosenOrig);
  optionsEl.querySelectorAll('.option').forEach(label=>{
    label.style.pointerEvents='none';
    const orig=Number(label.querySelector('input').dataset.orig);
    label.classList.remove('correct','incorrect','selected');
    if(q.correctAnswers.includes(orig)) label.classList.add('correct');
    if(orig===chosenOrig&&!correct) label.classList.add('incorrect');
    if(orig===chosenOrig) label.classList.add('selected');
  });
  feedbackEl.textContent=correct?'✓ Правильно!':'✗ Неправильно';
  feedbackEl.className='feedback '+(correct?'correct':'incorrect');
  feedbackEl.style.display='inline-block';
  if(q.explanation){ explainEl.innerHTML=q.explanation; explainEl.style.display='block'; }
  if(correct) score++; answered=true; questionsAnswered++;
  actionBtn.disabled=false;
  if(autoSkipOn) startBottomFill(3000); else if(!bottomActive) stopBottomFill();
  saveState();
}

function evaluateMulti(qidx){
  const q=currentQuestions[qidx];
  const chosen=Array.from(optionsEl.querySelectorAll('input:checked')).map(i=>Number(i.dataset.orig)).sort((a,b)=>a-b);
  userSelections[qidx]=chosen.slice();
  const corr=q.correctAnswers.slice().sort((a,b)=>a-b);
  const full=JSON.stringify(chosen)===JSON.stringify(corr);
  optionsEl.querySelectorAll('.option').forEach(label=>{
    label.style.pointerEvents='none';
    const orig=Number(label.querySelector('input').dataset.orig);
    label.classList.remove('correct','incorrect','selected');
    if(corr.includes(orig)) label.classList.add('correct');
    if(chosen.includes(orig)&&!corr.includes(orig)) label.classList.add('incorrect');
    if(chosen.includes(orig)) label.classList.add('selected');
  });
  feedbackEl.textContent=full?'✓ Полностью правильно!':'✗ Неправильно';
  feedbackEl.className='feedback '+(full?'correct':'incorrect');
  feedbackEl.style.display='inline-block';
  if(q.explanation){ explainEl.innerHTML=q.explanation; explainEl.style.display='block'; }
  if(full) score++; answered=true; questionsAnswered++;
  actionBtn.disabled=false;
  if(autoSkipOn) startBottomFill(4500); else if(!bottomActive) stopBottomFill();
  saveState();
}

// ====== NAVIGATION ======
function proceedToNext(isAuto){
  if(!isAuto&&bottomActive) cancelBottomIfRunning();
  if(currentIndex>=order.length) return;
  const qidx=order[currentIndex], q=currentQuestions[qidx];
  if(isMulti(q)&&!answered){ evaluateMulti(qidx); return; }
  if(!isMulti(q)&&!answered) return;

  let wasCorrect=false;
  if(isMulti(q)){
    const ch=(userSelections[qidx]||[]).slice().sort((a,b)=>a-b);
    const co=q.correctAnswers.slice().sort((a,b)=>a-b);
    wasCorrect=JSON.stringify(ch)===JSON.stringify(co);
  } else {
    wasCorrect=q.correctAnswers.includes((userSelections[qidx]||[])[0]);
  }

  if(mode==='mastery'&&!wasCorrect){
    const gap=Math.floor(Math.random()*3)+5;
    order.splice(Math.min(currentIndex+gap,order.length),0,qidx);
  }
  currentIndex++;
  if(currentIndex>=order.length){ showResults(); return; }
  renderCurrent();
}

// ====== RESULTS ======
function showResults(){
  stopBottomFill();
  testTitle.textContent=selectedSubject;
  testSubtitle.textContent='Результаты теста';
  questionCard.style.display='none'; resultsEl.style.display='block';
  const wrong=questionsAnswered-score;
  const pct=totalQuestionsInTest>0?Math.round((score/totalQuestionsInTest)*100):0;
  finalScore.textContent=`${score}/${totalQuestionsInTest}`;
  correctAnswersEl.textContent=score; wrongAnswersEl.textContent=wrong; percentageEl.textContent=pct+'%';
  const msgs=['Нужно поработать 💪','Удовлетворительно 📚','Хороший результат! 👍','Отличный результат! 🎉'];
  resultMessage.textContent=msgs[pct>=90?3:pct>=70?2:pct>=50?1:0];
  clearState();
}

function showConfirmFinishModal(){ confirmModal.classList.add('open'); }
function hideConfirmFinishModal(){ confirmModal.classList.remove('open'); }
function finishTest(){ hideConfirmFinishModal(); showResults(); }

function showSubjectSelection(){
  resultsEl.style.display='none'; questionCard.style.display='none';
  testTitle.textContent='QuizLab'; testSubtitle.textContent='Выберите предмет для начала';
  subjectListEl.style.display='block'; modeChoiceEl.style.display='none';
  modalTitle.textContent='Выберите предмет'; modalSub.textContent='Выберите тему для тестирования';
  startModal.style.display='flex';
  selectedSubject='';
  document.querySelectorAll('.subject-card').forEach(b=>b.classList.remove('selected'));
  clearState();
}

function checkSavedSession(){
  const s=loadState();
  if(s&&s.selectedSubject){
    if(confirm(`Продолжить незавершённый тест: "${s.selectedSubject}"?`)){
      selectedSubject=s.selectedSubject;
      startSession(s.mode,s);
      return true;
    } else clearState();
  }
  return false;
}

// ====== EVENTS ======
actionBtn.addEventListener('click',()=>{
  const qidx=order[currentIndex], q=currentQuestions[qidx];
  if(isMulti(q)&&!answered){ evaluateMulti(qidx); return; }
  if(currentIndex===order.length-1&&mode==='single'){ if(!isMulti(q)&&!answered) return; showResults(); }
  else proceedToNext(false);
});

prevBtn.addEventListener('click',()=>{ if(bottomActive) cancelBottomIfRunning(); if(currentIndex>0){ currentIndex--; renderCurrent(); } });
finishBtn.addEventListener('click',showConfirmFinishModal);
confirmCancelBtn.addEventListener('click',hideConfirmFinishModal);
confirmFinishBtn.addEventListener('click',finishTest);

toggleUI.addEventListener('click',()=>{
  autoSkipOn=!autoSkipOn;
  autoSkipEl.checked=autoSkipOn;
  toggleUI.classList.toggle('on',autoSkipOn);
  if(!autoSkipOn&&bottomActive) stopBottomFill();
});

singleBtn.addEventListener('click',()=>startSession('single'));
masteryBtn.addEventListener('click',()=>startSession('mastery'));

restartBtn.addEventListener('click',()=>{
  resultsEl.style.display='none';
  questionCard.style.display='block';
  if(selectedSubject) startSession(mode); else showSubjectSelection();
});

backToSubjectsBtn.addEventListener('click',showSubjectSelection);
backToSubjectsBtn2.addEventListener('click',()=>{
  subjectListEl.style.display='block';
  modeChoiceEl.style.display='none';
  modalTitle.textContent='Выберите предмет';
  modalSub.textContent='Выберите тему для тестирования';
});

themeBtn.addEventListener('click',()=>{ document.documentElement.classList.toggle('light'); });

document.addEventListener('keydown',(e)=>{
  if(e.key==='Enter') proceedToNext(false);
  if(e.key==='F5'||(e.ctrlKey&&e.key==='r')) e.preventDefault();
});

window.addEventListener('beforeunload',(e)=>{
  if(selectedSubject&&currentQuestions.length>0){ e.preventDefault(); e.returnValue=''; }
});

// ====== INIT ======
function init(){
  initSubjectSelection();
  if(!checkSavedSession()) startModal.style.display='flex';
}
document.addEventListener('DOMContentLoaded',init);
